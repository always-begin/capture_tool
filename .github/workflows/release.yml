name: Build and Release Exe

# 「vから始まるタグ」が push された時だけ、このCIを動かす
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    # PyInstallerでWindows用のexeを作るため、GitHub上のWindows環境を借りる
    runs-on: windows-latest

    steps:
      # 1. GitHubサーバーにあなたのソースコードをダウンロードする
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python環境をセットアップする
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 必要なライブラリとPyInstallerをインストールする
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. タグ名からバージョンを抽出し、バージョン情報ファイルを生成する
      - name: Generate version info
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref }}" -replace 'refs/tags/v', ''
          python scripts/generate_version_info.py $VERSION

      # 5. PyInstallerでexeをビルドする
      - name: Build with PyInstaller
        shell: pwsh
        run: |
          $scripts = python -c "import sysconfig; print(sysconfig.get_path('scripts'))"
          $env:PATH = "$scripts;" + $env:PATH
          pyinstaller --onefile --noconsole --name "CapTool" --version-file=version_info_generated.txt main.py

      # 6. 生成された CapTool.exe を GitHub Releases に自動で投稿する
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CapTool.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}