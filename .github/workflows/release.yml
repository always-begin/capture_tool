name: Build and Release Exe

# 「vから始まるタグ」が push された時だけ、このCIを動かす
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    # PyInstallerでWindows用のexeを作るため、GitHub上のWindows環境を借りる
    runs-on: windows-latest

    steps:
      # 1. GitHubサーバーにあなたのソースコードをダウンロードする
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python環境をセットアップする
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.5'

      # 3. 必要なライブラリとPyInstallerをインストールする
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # 4. タグ名からバージョンを抽出し、メタデータに注入してビルドする
      - name: Build with PyInstaller and Version Info
        shell: bash
        run: |
          # タグ名（refs/tags/v1.0.2 など）から「1.0.2」の数字だけを抽出
          VERSION=$(echo "${{ github.ref }}" | sed -e 's/refs\/tags\/v//')
          # カンマ区切りのバージョン形式（1,0,2,0）を作成
          VERSION_COMMA=$(echo "$VERSION" | sed -e 's/\./,/g'),0

          # 雛形ファイルのバージョン情報を、今回のタグのバージョンに自動書き換え
          sed -i "s/1, 0, 0, 0/$VERSION_COMMA/g" file_version_info.txt
          sed -i "s/1.0.0/$VERSION/g" file_version_info.txt

          # アプリ名を「CapTool」に指定してビルドを実行
          python -m pyinstaller --onefile --noconsole --name "CapTool" --version-file=file_version_info.txt main.py

      # 5. 生成された CapTool.exe を GitHub Releases に自動で投稿する
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CapTool.exe  # ← ステップ4の名前と完全に一致させました
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}